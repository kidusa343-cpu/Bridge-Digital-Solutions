<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#080c14"/>
  <!-- City skyline silhouette -->
  <rect x="0" y="300" width="800" height="300" fill="#0a0e18"/>
  <rect x="50" y="200" width="80" height="200" fill="#0d1220"/>
  <rect x="70" y="170" width="40" height="30" fill="#0d1220"/>
  <rect x="160" y="240" width="60" height="160" fill="#0d1220"/>
  <rect x="240" y="180" width="100" height="220" fill="#0f1428"/>
  <rect x="270" y="160" width="40" height="20" fill="#0f1428"/>
  <rect x="360" y="220" width="70" height="180" fill="#0d1220"/>
  <rect x="450" y="160" width="120" height="240" fill="#101628"/>
  <rect x="490" y="140" width="40" height="20" fill="#101628"/>
  <rect x="590" y="200" width="80" height="200" fill="#0d1220"/>
  <rect x="690" y="240" width="110" height="160" fill="#0d1220"/>
  <!-- Window lights -->
  <rect x="260" y="180" width="8" height="6" rx="1" fill="#c9a96e" opacity="0.6"/>
  <rect x="280" y="200" width="8" height="6" rx="1" fill="#7eb8c9" opacity="0.5"/>
  <rect x="300" y="190" width="8" height="6" rx="1" fill="#c9a96e" opacity="0.4"/>
  <rect x="260" y="220" width="8" height="6" rx="1" fill="#7eb8c9" opacity="0.5"/>
  <rect x="300" y="215" width="8" height="6" rx="1" fill="#c9a96e" opacity="0.6"/>
  <rect x="460" y="170" width="8" height="6" rx="1" fill="#c9a96e" opacity="0.7"/>
  <rect x="490" y="175" width="8" height="6" rx="1" fill="#7eb8c9" opacity="0.5"/>
  <rect x="520" y="168" width="8" height="6" rx="1" fill="#c9a96e" opacity="0.4"/>
  <rect x="460" y="195" width="8" height="6" rx="1" fill="#c9a96e" opacity="0.6"/>
  <rect x="490" y="200" width="8" height="6" rx="1" fill="#c9a96e" opacity="0.5"/>
  <!-- Stat overlay card -->
  <rect x="100" y="80" width="260" height="120" rx="8" fill="rgba(10,14,24,0.9)" stroke="#1e2a3e" stroke-width="1"/>
  <text x="120" y="110" font-family="system-ui" font-size="11" fill="#7eb8c9" letter-spacing="1">CAMPAIGN RESULTS</text>
  <text x="120" y="145" font-family="system-ui" font-size="36" fill="#c9a96e" font-weight="300">2.4M</text>
  <text x="230" y="145" font-family="system-ui" font-size="13" fill="#666">impressions</text>
  <text x="120" y="175" font-family="system-ui" font-size="11" fill="#888">Month 1 • LinkedIn + YouTube</text>
  <!-- Second stat card -->
  <rect x="440" y="60" width="220" height="100" rx="8" fill="rgba(10,14,24,0.9)" stroke="#1e2a3e" stroke-width="1"/>
  <text x="458" y="88" font-family="system-ui" font-size="10" fill="#7eb8c9" letter-spacing="1">INBOUND LEADS</text>
  <text x="458" y="125" font-family="system-ui" font-size="32" fill="#7ec97e" font-weight="300">+38%</text>
  <text x="458" y="148" font-family="system-ui" font-size="10" fill="#666">qualified enterprise leads</text>
  <!-- Video play button -->
  <circle cx="400" cy="350" r="50" fill="rgba(201,169,110,0.15)" stroke="#c9a96e" stroke-width="1.5"/>
  <polygon points="385,330 425,350 385,370" fill="#c9a96e" opacity="0.9"/>
  <text x="320" y="430" font-family="system-ui" font-size="12" fill="#888">5-part brand film series</text>
  <!-- Label -->
  <rect x="0" y="540" width="220" height="60" fill="rgba(0,0,0,0.8)"/>
  <text x="16" y="565" font-family="system-ui" font-size="10" fill="#c9a96e" letter-spacing="2">PROMOTION &amp; MEDIA</text>
  <text x="16" y="588" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">Meridian Brand Films</text>
</svg>