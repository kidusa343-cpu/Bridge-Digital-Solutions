<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#0a0a0f"/>
  <rect x="60" y="60" width="800" height="500" rx="10" fill="#0d0d14" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="60" y="60" width="800" height="36" rx="10" fill="#111118"/>
  <circle cx="88" cy="78" r="6" fill="#ff5f57"/>
  <circle cx="108" cy="78" r="6" fill="#febc2e"/>
  <circle cx="128" cy="78" r="6" fill="#28c840"/>
  <text x="86" y="115" font-family="monospace" font-size="12" fill="#c9a96e">import</text>
  <text x="140" y="115" font-family="monospace" font-size="12" fill="#ddd">{ createServer } from</text>
  <text x="350" y="115" font-family="monospace" font-size="12" fill="#7ec97e">'express'</text>
  <text x="86" y="138" font-family="monospace" font-size="12" fill="#c9a96e">import</text>
  <text x="140" y="138" font-family="monospace" font-size="12" fill="#ddd">{ db } from</text>
  <text x="240" y="138" font-family="monospace" font-size="12" fill="#7ec97e">'./database'</text>
  <text x="86" y="175" font-family="monospace" font-size="12" fill="#7eb8c9">const</text>
  <text x="130" y="175" font-family="monospace" font-size="12" fill="#ddd">app = createServer()</text>
  <text x="86" y="212" font-family="monospace" font-size="12" fill="#a07ec9">app.get</text>
  <text x="152" y="212" font-family="monospace" font-size="12" fill="#ddd">(</text>
  <text x="162" y="212" font-family="monospace" font-size="12" fill="#7ec97e">'/api/users'</text>
  <text x="268" y="212" font-family="monospace" font-size="12" fill="#ddd">, async (req, res) =&gt; {</text>
  <text x="106" y="235" font-family="monospace" font-size="12" fill="#7eb8c9">const</text>
  <text x="150" y="235" font-family="monospace" font-size="12" fill="#ddd">users = await db.query(</text>
  <text x="340" y="235" font-family="monospace" font-size="12" fill="#7ec97e">'SELECT * FROM users'</text>
  <text x="560" y="235" font-family="monospace" font-size="12" fill="#ddd">)</text>
  <text x="106" y="258" font-family="monospace" font-size="12" fill="#ddd">res.json({ users, total: users.length })</text>
  <text x="86" y="281" font-family="monospace" font-size="12" fill="#ddd">})</text>
  <text x="900" y="120" font-family="system-ui" font-size="14" fill="#c9a96e" font-weight="600">Stack</text>
  <text x="900" y="150" font-family="system-ui" font-size="11" fill="#7eb8c9">React · TypeScript</text>
  <text x="900" y="172" font-family="system-ui" font-size="11" fill="#7ec97e">Node.js · Express</text>
  <text x="900" y="194" font-family="system-ui" font-size="11" fill="#a07ec9">PostgreSQL · Redis</text>
  <text x="900" y="216" font-family="system-ui" font-size="11" fill="#c9a96e">AWS · Docker</text>
</svg>