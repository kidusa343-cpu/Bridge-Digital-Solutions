  <rect x="560" y="60" width="200" height="380" rx="16" fill="#0d0d14" stroke="#2e2e3e" stroke-width="2"/>
  <rect x="575" y="80" width="170" height="340" rx="8" fill="#111118"/>
  <text x="590" y="110" font-family="system-ui" font-size="12" fill="#c9a96e" font-weight="600">VOLTA</text>
