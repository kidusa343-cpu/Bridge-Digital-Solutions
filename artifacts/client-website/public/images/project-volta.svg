  <text x="620" y="265" font-family="system-ui" font-size="8" fill="#666">DC Fast · Free</text>
  <text x="720" y="258" font-family="system-ui" font-size="10" fill="#7ec97e" text-anchor="end">0.4mi</text>
  <rect x="590" y="282" width="150" height="40" rx="4" fill="#0a0a0f"/>
  <circle cx="605" cy="302" r="7" fill="#c9a96e" opacity="0.6"/>
  <text x="620" y="300" font-family="system-ui" font-size="10" fill="#ddd">Harbor Garage</text>
  <text x="620" y="313" font-family="system-ui" font-size="8" fill="#666">Level 2 · $0.25/min</text>
  <text x="720" y="306" font-family="system-ui" font-size="10" fill="#888" text-anchor="end">1.2mi</text>
  <rect x="590" y="345" width="150" height="36" rx="18" fill="#7ec97e" opacity="0.2"/>
  <text x="660" y="368" font-family="system-ui" font-size="11" fill="#7ec97e" text-anchor="middle">Reserve Now</text>
  <!-- Label -->
  <rect x="0" y="540" width="200" height="60" fill="rgba(0,0,0,0.8)"/>
  <text x="16" y="565" font-family="system-ui" font-size="10" fill="#c9a96e" letter-spacing="2">SOFTWARE</text>
  <text x="16" y="588" font-family="system-ui" font-size="13" fill="#fff" font-weight="600">Volta EV App</text>
