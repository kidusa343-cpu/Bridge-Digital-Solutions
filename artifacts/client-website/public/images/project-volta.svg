  <line x1="600" y1="0" x2="600" y2="600" stroke="#0f1830" stroke-width="1"/>
  <line x1="700" y1="0" x2="700" y2="600" stroke="#0f1830" stroke-width="1"/>
  <!-- Map roads -->
  <path d="M100,300 Q250,200 400,300 Q550,400 700,300" stroke="#1a2840" stroke-width="8" fill="none"/>
  <path d="M200,0 Q250,150 300,300 Q350,450 380,600" stroke="#1a2840" stroke-width="6" fill="none"/>
  <path d="M0,400 Q200,380 400,420 Q600,460 800,400" stroke="#1a2840" stroke-width="6" fill="none"/>
  <!-- Charging stations on map -->
  <circle cx="200" cy="250" r="16" fill="#7ec97e" opacity="0.3"/>
  <circle cx="200" cy="250" r="8" fill="#7ec97e" opacity="0.8"/>
