  <circle cx="350" cy="180" r="16" fill="#7ec97e" opacity="0.3"/>
  <circle cx="350" cy="180" r="8" fill="#7ec97e" opacity="0.8"/>
  <circle cx="500" cy="320" r="16" fill="#c9a96e" opacity="0.3"/>
