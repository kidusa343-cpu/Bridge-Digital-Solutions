  <line x1="0" y1="200" x2="800" y2="200" stroke="#0f1830" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#0f1830" stroke-width="1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#0f1830" stroke-width="1"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#0f1830" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="600" stroke="#0f1830" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="600" stroke="#0f1830" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="600" stroke="#0f1830" stroke-width="1"/>
