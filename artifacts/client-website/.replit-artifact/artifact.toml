kind = "web"
previewPath = "/"
title = "Public Website"
version = "1.0.0"
id = "artifacts/client-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18552

[services.development]
run = "pnpm --filter @workspace/client-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/client-website", "run", "build" ]
publicDir = "artifacts/client-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18552"
BASE_PATH = "/"
