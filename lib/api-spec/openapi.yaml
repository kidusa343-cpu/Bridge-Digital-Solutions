openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Luxury company platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: projects
    description: Project management
  - name: caseStudies
    description: Case study management
  - name: services
    description: Service management
  - name: company
    description: Company information
  - name: media
    description: Media/file management
  - name: settings
    description: Settings management
  - name: users
    description: User management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Bad request

  # USERS (admin only)
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all admin users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new admin user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # PROJECTS
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: featured
          in: query
          schema:
            type: boolean
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # CASE STUDIES
  /case-studies:
    get:
      operationId: listCaseStudies
      tags: [caseStudies]
      summary: List all case studies
      parameters:
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Case studies list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseStudy"
    post:
      operationId: createCaseStudy
      tags: [caseStudies]
      summary: Create a case study
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseStudyInput"
      responses:
        "201":
          description: Created case study
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseStudy"
  /case-studies/{id}:
    get:
      operationId: getCaseStudy
      tags: [caseStudies]
      summary: Get a case study by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case study
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseStudy"
        "404":
          description: Not found
    patch:
      operationId: updateCaseStudy
      tags: [caseStudies]
      summary: Update a case study
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseStudyUpdate"
      responses:
        "200":
          description: Updated case study
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseStudy"
    delete:
      operationId: deleteCaseStudy
      tags: [caseStudies]
      summary: Delete a case study
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # SERVICES
  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      responses:
        "200":
          description: Services list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a service
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get a service by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a service
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # COMPANY
  /company:
    get:
      operationId: getCompany
      tags: [company]
      summary: Get company information
      responses:
        "200":
          description: Company info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    patch:
      operationId: updateCompany
      tags: [company]
      summary: Update company information
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  # MEDIA
  /media:
    get:
      operationId: listMedia
      tags: [media]
      summary: List all media files
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Media list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Media"
  /media/{id}:
    get:
      operationId: getMedia
      tags: [media]
      summary: Get a media file by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Media
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Media"
    patch:
      operationId: updateMedia
      tags: [media]
      summary: Update media metadata
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaUpdate"
      responses:
        "200":
          description: Updated media
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Media"
    delete:
      operationId: deleteMedia
      tags: [media]
      summary: Delete a media file
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # SETTINGS
  /settings:
    get:
      operationId: listSettings
      tags: [settings]
      summary: List all settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
  /settings/{key}:
    get:
      operationId: getSetting
      tags: [settings]
      summary: Get a setting by key
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setting"
        "404":
          description: Not found
    put:
      operationId: upsertSetting
      tags: [settings]
      summary: Create or update a setting
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingInput"
      responses:
        "200":
          description: Upserted setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setting"

  # DASHBOARD STATS (wow endpoint)
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [settings]
      summary: Get dashboard statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # AUTH
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6

    # USERS
    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    UserInput:
      type: object
      required: [email, name, password, role]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string

    UserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string

    # PROJECTS
    Project:
      type: object
      required: [id, title, slug, description, status, featured, sortOrder, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        content:
          type: ["string", "null"]
        client:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        category:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        coverImageUrl:
          type: ["string", "null"]
        imageUrls:
          type: ["string", "null"]
        status:
          type: string
        featured:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    ProjectInput:
      type: object
      required: [title, slug, description, status]
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        content:
          type: string
        client:
          type: string
        year:
          type: integer
        category:
          type: string
        tags:
          type: string
        coverImageUrl:
          type: string
        imageUrls:
          type: string
        status:
          type: string
        featured:
          type: boolean
        sortOrder:
          type: integer

    ProjectUpdate:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        content:
          type: string
        client:
          type: string
        year:
          type: integer
        category:
          type: string
        tags:
          type: string
        coverImageUrl:
          type: string
        imageUrls:
          type: string
        status:
          type: string
        featured:
          type: boolean
        sortOrder:
          type: integer

    # CASE STUDIES
    CaseStudy:
      type: object
      required: [id, title, slug, summary, challenge, solution, outcome, featured, sortOrder, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        challenge:
          type: string
        solution:
          type: string
        outcome:
          type: string
        client:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        duration:
          type: ["string", "null"]
        coverImageUrl:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        metrics:
          type: ["string", "null"]
        featured:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    CaseStudyInput:
      type: object
      required: [title, slug, summary, challenge, solution, outcome]
      properties:
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        challenge:
          type: string
        solution:
          type: string
        outcome:
          type: string
        client:
          type: string
        industry:
          type: string
        duration:
          type: string
        coverImageUrl:
          type: string
        tags:
          type: string
        metrics:
          type: string
        featured:
          type: boolean
        sortOrder:
          type: integer

    CaseStudyUpdate:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        challenge:
          type: string
        solution:
          type: string
        outcome:
          type: string
        client:
          type: string
        industry:
          type: string
        duration:
          type: string
        coverImageUrl:
          type: string
        tags:
          type: string
        metrics:
          type: string
        featured:
          type: boolean
        sortOrder:
          type: integer

    # SERVICES
    Service:
      type: object
      required: [id, title, slug, description, sortOrder, active, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        content:
          type: ["string", "null"]
        iconName:
          type: ["string", "null"]
        coverImageUrl:
          type: ["string", "null"]
        features:
          type: ["string", "null"]
        sortOrder:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    ServiceInput:
      type: object
      required: [title, slug, description]
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        content:
          type: string
        iconName:
          type: string
        coverImageUrl:
          type: string
        features:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean

    ServiceUpdate:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        content:
          type: string
        iconName:
          type: string
        coverImageUrl:
          type: string
        features:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean

    # COMPANY
    Company:
      type: object
      required: [id, name, tagline, description, email, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        foundedYear:
          type: ["integer", "null"]
        teamSize:
          type: ["string", "null"]
        linkedinUrl:
          type: ["string", "null"]
        twitterUrl:
          type: ["string", "null"]
        instagramUrl:
          type: ["string", "null"]
        missionStatement:
          type: ["string", "null"]
        visionStatement:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        country:
          type: string
        website:
          type: string
        logoUrl:
          type: string
        foundedYear:
          type: integer
        teamSize:
          type: string
        linkedinUrl:
          type: string
        twitterUrl:
          type: string
        instagramUrl:
          type: string
        missionStatement:
          type: string
        visionStatement:
          type: string

    # MEDIA
    Media:
      type: object
      required: [id, filename, originalName, mimeType, size, url, createdAt]
      properties:
        id:
          type: integer
        filename:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        url:
          type: string
        alt:
          type: ["string", "null"]
        caption:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    MediaUpdate:
      type: object
      properties:
        alt:
          type: string
        caption:
          type: string

    # SETTINGS
    Setting:
      type: object
      required: [id, key, value, createdAt]
      properties:
        id:
          type: integer
        key:
          type: string
        value:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    SettingInput:
      type: object
      required: [value]
      properties:
        value:
          type: string
        description:
          type: string

    # DASHBOARD
    DashboardStats:
      type: object
      required: [totalProjects, totalCaseStudies, totalServices, totalMedia, featuredProjects, featuredCaseStudies, activeServices]
      properties:
        totalProjects:
          type: integer
